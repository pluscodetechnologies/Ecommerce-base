<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Velvet Store Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-family: 'Playfair Display', serif; font-size: 26px; letter-spacing: 4px; color: #1a1a2e; }
        .logo span { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: #999; }
        h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 8px; }
        p.subtitle { font-size: 13px; color: #999; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; font-size: 14px; }
        .form-group input { width: 100%; padding: 13px 15px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-family: 'Poppins', sans-serif; font-size: 14px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #1a1a2e; }
        .hint { font-size: 12px; color: #aaa; margin-top: 5px; }
        .btn { width: 100%; background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'Poppins', sans-serif; margin-top: 8px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .feedback { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 18px; display: none; }
        .feedback.success { background: #d4edda; color: #155724; }
        .feedback.error { background: #f8d7da; color: #721c24; }
        .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #999; text-decoration: none; }
        .back-link:hover { color: #1a1a2e; }
        .invalid-state { text-align: center; padding: 20px 0; }
        .invalid-state i { font-size: 48px; color: #f8d7da; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>VELVET</h1>
            <span>Admin Panel</span>
        </div>

        <div id="invalidState" class="invalid-state" style="display:none;">
            <p style="color:#721c24; font-size:15px;">Link inválido ou expirado.</p>
            <a href="/admin" style="display:inline-block;margin-top:16px;font-size:13px;color:#1a1a2e;">Voltar ao login</a>
        </div>

        <div id="formState">
            <h2>Criar nova senha</h2>
            <p class="subtitle">Escolha uma senha forte para sua conta.</p>
            <div class="feedback" id="feedback"></div>
            <div class="form-group">
                <label>Nova senha</label>
                <input type="password" id="newPassword" placeholder="••••••••">
                <div class="hint">Mínimo 8 caracteres, uma letra maiúscula, um número e um símbolo (@$!%*?&)</div>
            </div>
            <div class="form-group">
                <label>Confirmar nova senha</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button class="btn" id="submitBtn">Redefinir senha</button>
        </div>

        <a href="/admin" class="back-link">← Voltar ao login</a>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
            document.getElementById('formState').style.display = 'none';
            document.getElementById('invalidState').style.display = 'block';
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');
            const feedback = document.getElementById('feedback');

            if (!newPassword || !confirmPassword) {
                feedback.textContent = 'Preencha todos os campos.';
                feedback.className = 'feedback error';
                feedback.style.display = 'block';
                return;
            }
            if (newPassword !== confirmPassword) {
                feedback.textContent = 'As senhas não coincidem.';
                feedback.className = 'feedback error';
                feedback.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const result = await res.json();

                if (result.success) {
                    feedback.textContent = 'Senha redefinida! Redirecionando...';
                    feedback.className = 'feedback success';
                    feedback.style.display = 'block';
                    setTimeout(() => window.location.href = '/admin', 2000);
                } else {
                    feedback.textContent = result.message;
                    feedback.className = 'feedback error';
                    feedback.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Redefinir senha';
                }
            } catch (e) {
                feedback.textContent = 'Erro ao redefinir senha.';
                feedback.className = 'feedback error';
                feedback.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Redefinir senha';
            }
        });
    </script>
</body>
</html>
