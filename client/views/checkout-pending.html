<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pendente | Velvet Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #8B7355; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #FDFCFB; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; padding: 40px; }
        .icon { width: 100px; height: 100px; background: #DAA520; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; color: white; font-size: 50px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 36px; margin-bottom: 15px; }
        p { color: #666; margin-bottom: 10px; }
        .btn { display: inline-block; padding: 14px 36px; background: var(--primary); color: white; text-decoration: none; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-clock"></i></div>
        <h1>Aguardando Pagamento</h1>
        <p>Seu pagamento está sendo processado.</p>
        <p>Assim que for confirmado, você receberá um email.</p>
        <a href="/" class="btn">Voltar para Home</a>
    </div>
</body>
</html>
