<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado | Velvet Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #8B7355; --dark: #1A1817; --light: #FDFCFB; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--light); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-container { text-align: center; padding: 40px; }
        .success-icon { width: 100px; height: 100px; background: #2E8B57; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; color: white; font-size: 50px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 36px; margin-bottom: 15px; }
        p { color: #666; margin-bottom: 10px; font-size: 16px; }
        .order-number { font-weight: 600; color: var(--primary); font-size: 20px; margin: 20px 0; }
        .btn { display: inline-block; padding: 14px 36px; background: var(--primary); color: white; text-decoration: none; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon"><i class="fas fa-check"></i></div>
        <h1>Pedido Confirmado!</h1>
        <p>Seu pedido foi recebido e está sendo processado.</p>
        <div class="order-number" id="orderNumber"></div>
        <p>Você receberá um email com os detalhes.</p>
        <a href="/" class="btn">Voltar para Home</a>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const order = params.get('order') || params.get('external_reference');
        if (order) document.getElementById('orderNumber').textContent = 'Pedido #' + order;
    </script>
</body>
</html>
