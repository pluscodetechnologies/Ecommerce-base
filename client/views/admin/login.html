<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Velvet Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .admin-login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .admin-login-box {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .admin-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .admin-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: #1a1a2e;
            letter-spacing: 4px;
        }
        
        .admin-logo span {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }
        
        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1a1a2e;
            box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.1);
        }
        
        .password-input {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
        }
        
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .error-message {
            background: #fee;
            color: #c0392b;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-to-site {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-to-site a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .back-to-site a:hover {
            color: #1a1a2e;
        }
        
        .security-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
        
        .security-info i {
            color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-box">
            <div class="admin-logo">
                <h1>VELVET</h1>
                <span>store</span>
            </div>
            
            <div style="text-align: center;">
                <span class="admin-badge">
                    <i class="fas fa-lock" style="margin-right: 8px;"></i>
                    Área Administrativa
                </span>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="admin@velvetstore.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label>Senha</label>
                    <div class="password-input">
                        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="password-toggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
                    Acessar Painel
                </button>
            </form>
            
            <div class="back-to-site">
                <a href="/">
                    <i class="fas fa-arrow-left" style="margin-right: 5px;"></i>
                    Voltar para o site
                </a>
            </div>
            
            <div class="security-info">
                <i class="fas fa-shield-alt"></i>
                <span>Conexão segura - Acesso restrito a administradores</span>
            </div>
        </div>
    </div>
    
    <script>
        document.querySelector('.password-toggle').addEventListener('click', function() {
            const input = this.parentElement.querySelector('input');
            const icon = this.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const user = result.data.user;
                    
                    if (user.role !== 'admin') {
                        document.getElementById('errorMessage').textContent = 'Acesso negado. Apenas administradores podem acessar esta área.';
                        document.getElementById('errorMessage').style.display = 'block';
                        return;
                    }
                    
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    window.location.href = '/admin/dashboard';
                } else {
                    document.getElementById('errorMessage').textContent = result.message;
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'Erro ao fazer login. Tente novamente.';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
